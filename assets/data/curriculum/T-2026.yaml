# ==========================================
# 3. 判定ロジック（進級・卒業要件）
# ==========================================
requirements:
  # --- 3年次への進級条件 ---
  - id: "promotion_to_3rd_year"
    title: "3年次への進級条件"
    total_credits_required: 0 # 全体合計の指定なし
    categories:
      - category_name: "専門教育科目"
        min_credits: 0
        check_all_is_required: false
        must_have_course_ids: ["prof-29"] # 情報通信工学実験Ⅰ

  # --- 卒業研修Ⅰ（3年後期）の履修前提条件 ---
  # 進級条件とは別に、重要科目としての判定用
  - id: "pre_requirement_seminar_1"
    title: "卒業研修Ⅰ 履修前提条件"
    total_credits_required: 0
    categories:
      - category_name: "専門教育科目"
        min_credits: 60
        check_all_is_required: false
        must_have_course_ids: ["prof-29", "prof-39"] # 実験Ⅰ, Ⅱ
      - category_name: "教養教育科目"
        min_credits: 0
        check_all_is_required: false
        # 英語必修2単位（IA, IB）およびスタディスキル1単位
        must_have_course_ids: ["gen-18", "gen-19", "gen-21"]

  # --- 4年次への進級条件 ---
  - id: "promotion_to_4th_year"
    title: "4年次への進級条件"
    total_credits_required: 100
    categories:
      - category_name: "専門教育科目"
        min_credits: 76
        check_all_is_required: false
        must_have_course_ids: ["prof-29", "prof-39", "prof-63"] # 実験Ⅰ, Ⅱ, 卒業研修Ⅰ
      - category_name: "教養教育科目"
        min_credits: 20
        check_all_is_required: false
        # 指定された特定の教養必修群
        must_have_course_ids: ["gen-18", "gen-19", "gen-21", "gen-33", "gen-36", "gen-40"]

  # --- 卒業要件 ---
  - id: "graduation_requirements"
    title: "卒業に要する最低修得単位数"
    total_credits_required: 124
    categories:
      - category_name: "専門教育科目"
        min_credits: 100
        check_all_is_required: true # 必修60単位を含むためtrue設定
        must_have_course_ids: []
      - category_name: "教養教育科目"
        min_credits: 24
        check_all_is_required: true # 必修8単位を含むためtrue設定
        must_have_course_ids: []

# exclusive_groups: 

credit_limit_rules:
  - category_name: "教養教育科目"
    groups:
      - id: "limit-gen-extracurricular"
        name: "教養特別課外活動 上限"
        description: "合わせて4単位まで卒業単位として算入可能"
        max_credits_allowed: 4
        course_ids: ["gen-47", "gen-48", "gen-49", "gen-50"]
      - id: "limit-gen-other-univ"
        name: "他大学等教養科目群 上限"
        description: "4単位まで卒業単位として算入可能"
        max_credits_allowed: 4
        course_ids: ["gen-51"]

  - category_name: "専門教育科目"
    groups:
      - id: "limit-prof-extracurricular"
        name: "専門特別課外活動 上限"
        description: "合わせて4単位まで卒業単位として算入可能"
        max_credits_allowed: 4
        course_ids: ["prof-69", "prof-70", "prof-71", "prof-72"]
