requirements:
  # 3年次への進級条件
  - id: "promotion_to_3rd_year"
    title: "3年次への進級条件"
    categories:
      - category_name: "専門教育科目"
        must_have_course_ids: ["prof-27"] # 情報通信工学実験Ⅰ

  # 4年次への進級条件
  - id: "promotion_to_4th_year"
    title: "4年次への進級条件"
    total_credits_required: 100
    categories:
      - category_name: "専門教育科目"
        min_credits: 76
        must_have_course_ids: ["prof-27", "prof-36", "prof-45"]
      - category_name: "教養教育科目"
        min_credits: 20
        must_have_course_ids: ["gen-01", "gen-04", "gen-08", "gen-32", "gen-33", "gen-34"]

  # 卒業要件
  - id: "graduation"
    title: "卒業に要する条件"
    total_credits_required: 124
    categories:
      - category_name: "専門教育科目"
        min_credits: 100
        required_is_required_credits: 56 # 必修56単位
        check_all_is_required: true
      - category_name: "教養教育科目"
        min_credits: 24
        required_is_required_credits: 8 # 必修8単位
        check_all_is_required: true

# 排他制御の定義
# どれかを1科目分のみ選択可能、これは同一時刻に授業が入っているときに有効
exclusive_groups:
  - id: "gen-group-culture-1"
    name: "表象文化論・現代社会論 選択"
    course_ids: ["gen-11", "gen-12"]

  - id: "gen-group-history-1"
    name: "東北文化史・メディア文化史 選択"
    course_ids: ["gen-13", "gen-14"]
    max_credits_allowed: 2

# 合計単位数の制限ルール（特別課外活動・他学科科目など）
credit_limit_groups:
  # --- 専門教育科目 ---
  - id: "limit-prof-extracurricular"
    name: "専門教育 特別課外活動（※1）"
    description: "特別課外活動Ⅰ〜Ⅵの合計で6単位まで算出可能"
    course_ids: ["prof-61", "prof-62", "prof-63", "prof-64", "prof-65", "prof-66"]
    max_credits_allowed: 6

  - id: "limit-prof-other-dept"
    name: "専門教育 他学科・他大学科目（※2）"
    description: "他学科および他大学科目の合計で4単位まで算出可能"
    course_ids: ["prof-67", "prof-68"]
    max_credits_allowed: 4

  # --- 教養教育科目 ---
  - id: "limit-gen-extracurricular"
    name: "教養教育 特別課外活動"
    description: "学際区分の特別課外活動の合計上限（※学校規定に準ずる）"
    course_ids: ["gen-47", "gen-48", "gen-49", "gen-50"]
